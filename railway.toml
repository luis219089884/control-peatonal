# Configuración Railway en la raíz del monorepo (backend/ + frontend/)
[build]
builder = "nixpacks"

[deploy]
startCommand = "cd backend && bash start.sh"
releaseCommand = "cd backend && python manage.py migrate --noinput"
healthcheckPath = "/health/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
