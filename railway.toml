# Configuración Railway en la raíz del monorepo (backend/ + frontend/)
[build]
builder = "nixpacks"

[deploy]
startCommand = "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
releaseCommand = "cd backend && python manage.py migrate --noinput"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
